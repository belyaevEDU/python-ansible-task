services:
  httpstatus:
    image: ghcr.io/aaronpowell/httpstatus:main
    container_name: httpstatus
    restart: unless-stopped
    ports:
      - "8080:8080"

    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev