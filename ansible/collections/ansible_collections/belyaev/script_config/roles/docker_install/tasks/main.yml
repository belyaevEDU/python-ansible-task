---

- name: Delete, if present, docker sources in apt sources list
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.sources
    state: absent

- name: Delete, if present, docker's gpg keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    state: absent

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - python3-debian
    state: present
    update_cache: true

- name: Add docker apt repository
  ansible.builtin.deb822_repository:
    name: "Docker"
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ docker_install_ubuntu_codename }}"
    components: stable
    architectures: amd64
    signed_by: https://download.docker.com/linux/ubuntu/gpg
    enabled: true

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Add current user to Docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Start docker service
  ansible.builtin.systemd_service:
    name: docker
    state: started

- name: Ensure docker is up
  ansible.builtin.command: docker --version
  changed_when: false
